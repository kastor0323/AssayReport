  <line x1="612" y1="358" x2="634" y2="358" stroke="#27AE60" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="636" y="324" width="204" height="68" rx="3" fill="#D5F5E3" stroke="#27AE60"/>
  <text x="738" y="347" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D6A36">키워드 추출</text>
