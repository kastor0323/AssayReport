  <!-- Arrow 6 → 5 (upward, scraping feeds data) -->
  <line x1="450" y1="692" x2="450" y2="644" stroke="#C0392B" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="462" y="674" font-size="9.5" fill="#C0392B">수집 저장</text>

