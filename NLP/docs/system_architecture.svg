  <rect x="602" y="584" width="248" height="48" rx="3" fill="#FDEBD0" stroke="#F39C12"/>
  <text x="726" y="604" text-anchor="middle" font-size="12" font-weight="bold" fill="#784212">기업 인재상 DB</text>
