<svg xmlns="http://www.w3.org/2000/svg" width="640" height="960"
     font-family="'Malgun Gothic','Apple SD Gothic Neo','Segoe UI',sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#555"/>
    </marker>
  </defs>

  <rect width="640" height="960" fill="white"/>
  <rect x=".5" y=".5" width="639" height="959" fill="none" stroke="#ddd" rx="4"/>

  <!-- Title -->
  <text x="320" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a1a">사용자 흐름</text>
  <line x1="40" y1="46" x2="600" y2="46" stroke="#ddd"/>

  <!-- ── START ── -->
  <ellipse cx="320" cy="76" rx="90" ry="22" fill="#D5E8D4" stroke="#82B366" stroke-width="1.5"/>
  <text x="320" y="81" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4A1D">시작</text>

  <line x1="320" y1="98"  x2="320" y2="116" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── 1. 회원가입 / 로그인 ── -->
  <circle cx="95" cy="146" r="14" fill="#6C8EBF"/>
  <text x="95" y="151" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1</text>
  <rect x="118" y="118" width="420" height="56" rx="4" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.5"/>
  <text x="328" y="141" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B3A6B">회원가입 / 로그인</text>
  <text x="328" y="161" text-anchor="middle" font-size="11" fill="#333">Spring Boot · JWT 토큰 발급 · 세션 유지</text>

  <line x1="320" y1="174" x2="320" y2="192" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── 2. 직무 · 기업 입력 ── -->
  <circle cx="95" cy="222" r="14" fill="#6C8EBF"/>
  <text x="95" y="227" text-anchor="middle" font-size="11" font-weight="bold" fill="white">2</text>
  <rect x="118" y="194" width="420" height="56" rx="4" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.5"/>
  <text x="328" y="217" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B3A6B">직무 · 기업 정보 입력</text>
  <text x="328" y="237" text-anchor="middle" font-size="11" fill="#333">직무명 · 직무분야 · 지원 회사 선택</text>

  <line x1="320" y1="250" x2="320" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── 3. 자소서 문항 작성 ── -->
  <circle cx="95" cy="298" r="14" fill="#6C8EBF"/>
  <text x="95" y="303" text-anchor="middle" font-size="11" font-weight="bold" fill="white">3</text>
  <rect x="118" y="270" width="420" height="56" rx="4" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.5"/>
  <text x="328" y="293" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B3A6B">자소서 문항 작성</text>
  <text x="328" y="313" text-anchor="middle" font-size="11" fill="#333">질문(Q) + 답변(A) 페어 입력 (1개 이상)</text>

  <line x1="320" y1="326" x2="320" y2="344" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── 4. 분석 요청 ── -->
  <circle cx="95" cy="374" r="14" fill="#9673A6"/>
  <text x="95" y="379" text-anchor="middle" font-size="11" font-weight="bold" fill="white">4</text>
  <rect x="118" y="346" width="420" height="56" rx="4" fill="#E1D5E7" stroke="#9673A6" stroke-width="1.5"/>
  <text x="328" y="369" text-anchor="middle" font-size="13" font-weight="bold" fill="#3D1A52">분석 요청</text>
  <text x="328" y="389" text-anchor="middle" font-size="11" fill="#333">Flask POST /evaluate · 자소서 JSON 전송</text>

  <line x1="320" y1="402" x2="320" y2="420" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── 5. NLP 처리 (big box) ── -->
  <circle cx="95" cy="465" r="14" fill="#82B366"/>
  <text x="95" y="470" text-anchor="middle" font-size="11" font-weight="bold" fill="white">5</text>
  <rect x="118" y="422" width="420" height="100" rx="4" fill="#D5E8D4" stroke="#82B366" stroke-width="1.5"/>
  <text x="328" y="446" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4A1D">NLP 처리 엔진</text>

  <rect x="130" y="454" width="118" height="52" rx="3" fill="#A8D5A2" stroke="#82B366"/>
  <text x="189" y="474" text-anchor="middle" font-size="11" font-weight="bold" fill="#1D4A1D">Kiwi</text>
  <text x="189" y="491" text-anchor="middle" font-size="10" fill="#333">한국어 형태소</text>

  <rect x="261" y="454" width="118" height="52" rx="3" fill="#A8D5A2" stroke="#82B366"/>
  <text x="320" y="474" text-anchor="middle" font-size="11" font-weight="bold" fill="#1D4A1D">NLTK</text>
  <text x="320" y="491" text-anchor="middle" font-size="10" fill="#333">영어 품사 태깅</text>

  <rect x="392" y="454" width="134" height="52" rx="3" fill="#A8D5A2" stroke="#82B366"/>
  <text x="459" y="474" text-anchor="middle" font-size="11" font-weight="bold" fill="#1D4A1D">불용어 제거</text>
  <text x="459" y="491" text-anchor="middle" font-size="10" fill="#333">키워드 추출</text>

  <line x1="320" y1="522" x2="320" y2="540" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── 6. 질문 카테고리 분류 ── -->
  <circle cx="95" cy="570" r="14" fill="#D6B656"/>
  <text x="95" y="575" text-anchor="middle" font-size="11" font-weight="bold" fill="white">6</text>
  <rect x="118" y="542" width="420" height="56" rx="4" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.5"/>
  <text x="328" y="565" text-anchor="middle" font-size="13" font-weight="bold" fill="#5C4B00">질문 카테고리 분류</text>
  <text x="328" y="585" text-anchor="middle" font-size="10.5" fill="#333">지원동기 · 성장과정 · 경험 · 직무역량 · 입사포부 등 8종</text>

  <line x1="320" y1="598" x2="320" y2="616" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── 7. 합격 키워드 매칭 ── -->
  <circle cx="95" cy="646" r="14" fill="#D6B656"/>
  <text x="95" y="651" text-anchor="middle" font-size="11" font-weight="bold" fill="white">7</text>
  <rect x="118" y="618" width="420" height="56" rx="4" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.5"/>
  <text x="328" y="641" text-anchor="middle" font-size="13" font-weight="bold" fill="#5C4B00">합격 키워드 매칭</text>
  <text x="328" y="661" text-anchor="middle" font-size="11" fill="#333">동일 직무 · 카테고리 키워드 교집합(∩) 분석</text>

  <line x1="320" y1="674" x2="320" y2="692" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── 8. 종합 점수 산출 (big box) ── -->
  <circle cx="95" cy="740" r="14" fill="#D79B00"/>
  <text x="95" y="745" text-anchor="middle" font-size="11" font-weight="bold" fill="white">8</text>
  <rect x="118" y="694" width="420" height="100" rx="4" fill="#FFE6CC" stroke="#D79B00" stroke-width="1.5"/>
  <text x="328" y="716" text-anchor="middle" font-size="13" font-weight="bold" fill="#6D3A00">종합 점수 산출</text>

  <rect x="130" y="722" width="190" height="56" rx="3" fill="#FFD0A0" stroke="#D79B00"/>
  <text x="225" y="744" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D3A00">키워드 매칭 점수</text>
  <text x="225" y="762" text-anchor="middle" font-size="10.5" fill="#333">합격 키워드 일치율 (70%)</text>

  <rect x="336" y="722" width="190" height="56" rx="3" fill="#FFD0A0" stroke="#D79B00"/>
  <text x="431" y="744" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D3A00">비전 정합성 점수</text>
  <text x="431" y="762" text-anchor="middle" font-size="10.5" fill="#333">기업 인재상 부합도 (30%)</text>

  <line x1="320" y1="794" x2="320" y2="812" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── 9. 결과 표시 ── -->
  <circle cx="95" cy="847" r="14" fill="#82B366"/>
  <text x="95" y="852" text-anchor="middle" font-size="11" font-weight="bold" fill="white">9</text>
  <rect x="118" y="814" width="420" height="72" rx="4" fill="#D5E8D4" stroke="#82B366" stroke-width="1.5"/>
  <text x="328" y="838" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4A1D">결과 표시</text>
  <text x="328" y="858" text-anchor="middle" font-size="11" fill="#333">종합 점수 · 등급 (S≥80 / A≥60 / B≥40 / C)</text>
  <text x="328" y="876" text-anchor="middle" font-size="11" fill="#333">매칭된 합격 키워드 · 비전 키워드 목록</text>

  <line x1="320" y1="886" x2="320" y2="908" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── END ── -->
  <ellipse cx="320" cy="930" rx="90" ry="22" fill="#D5E8D4" stroke="#82B366" stroke-width="1.5"/>
  <text x="320" y="935" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4A1D">종료</text>
</svg>
